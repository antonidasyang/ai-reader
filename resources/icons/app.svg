<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EAF6"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFEB3B" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FFC107" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- App tile background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Page sheet, slightly tilted -->
  <g transform="translate(256 256) rotate(-6) translate(-256 -256)">
    <!-- back-page shadow -->
    <rect x="124" y="116" width="248" height="320" rx="16" ry="16"
          fill="#000000" opacity="0.18"/>
    <!-- main page with folded corner -->
    <path d="M 132 108
             L 348 108
             L 392 152
             L 392 412
             Q 392 428 376 428
             L 132 428
             Q 116 428 116 412
             L 116 124
             Q 116 108 132 108 Z"
          fill="url(#page)" stroke="#C5CAE9" stroke-width="2"/>
    <!-- folded corner triangle -->
    <path d="M 348 108 L 392 152 L 348 152 Z"
          fill="#C5CAE9" opacity="0.85"/>

    <!-- Text lines on page -->
    <g fill="#3949AB" opacity="0.85">
      <rect x="148" y="200" width="180" height="14" rx="6"/>
      <rect x="148" y="232" width="216" height="14" rx="6"/>
      <rect x="148" y="264" width="160" height="14" rx="6"/>
      <rect x="148" y="296" width="208" height="14" rx="6"/>
      <rect x="148" y="328" width="120" height="14" rx="6"/>
    </g>
  </g>

  <!-- AI sparkle / star, lower-right -->
  <g transform="translate(376 376)">
    <circle cx="0" cy="0" r="64" fill="url(#spark)"/>
    <path d="M 0 -34
             L 8 -8
             L 34 0
             L 8 8
             L 0 34
             L -8 8
             L -34 0
             L -8 -8 Z"
          fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="6" fill="#FFEB3B"/>
  </g>
</svg>
